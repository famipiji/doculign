services:
  db:
    image: postgres:16
    restart: always
    environment:
      POSTGRES_PASSWORD: Q@simbu5uk
      POSTGRES_DB: dms_db
    ports:
      - "5432:5432"

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.15.0
    hostname: elasticsearch
    restart: always
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    ports:
      - "9200:9200"
    ulimits:
      memlock:
        soft: -1
        hard: -1

  api:
    build:
      context: ./DmsApi
      dockerfile: Dockerfile
    ports:
      - "5000:8080"
    depends_on:
      - db
      - elasticsearch
    environment:
      ConnectionStrings__DefaultConnection: "Host=db;Database=dms_db;Username=postgres;Password=Q@simbu5uk;"
      Elasticsearch__Url: "http://elasticsearch:9200"

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:80"
    depends_on:
      - api
